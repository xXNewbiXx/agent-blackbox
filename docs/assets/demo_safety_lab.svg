<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <title>Agent Blackbox Demo Pack</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1324"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="40" y="32" width="1120" height="610" rx="18" fill="#f5f7ff"/>
  <rect x="70" y="72" width="1060" height="110" rx="12" fill="#12203f"/>
  <text x="95" y="110" font-size="28" fill="#9fdcff" font-family="Arial, Helvetica, sans-serif">Demo Run: safety lab</text>
  <text x="95" y="145" font-size="18" fill="#d9e2ff" font-family="Arial, Helvetica, sans-serif">
    Command: python3 -m agent_blackbox run -- python3 examples/tiny_agent.py
  </text>

  <rect x="70" y="220" width="516" height="230" rx="10" fill="#101f3b"/>
  <rect x="614" y="220" width="516" height="230" rx="10" fill="#101f3b"/>
  <text x="95" y="255" font-size="21" fill="#9fdcff" font-family="Arial, Helvetica, sans-serif">Evidence</text>
  <text x="95" y="288" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">run_id: demo-2026-05-03</text>
  <text x="95" y="312" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">exit_code: 0</text>
  <text x="95" y="336" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">changed_files: .github/workflows/release.yml</text>
  <text x="95" y="360" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">stderr: policy gate triggered</text>
  <text x="95" y="384" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">risk_hints: file_write, network_hint, destructive_hint</text>
  <text x="95" y="422" font-size="16" fill="#ff6b6b" font-family="Arial, Helvetica, sans-serif">decision: BLOCK</text>

  <text x="634" y="255" font-size="21" fill="#9fdcff" font-family="Arial, Helvetica, sans-serif">Policy Result</text>
  <text x="634" y="290" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">Action required:</text>
  <text x="634" y="320" font-size="16" fill="#f7d16b" font-family="Arial, Helvetica, sans-serif">- Review changed release-related files.</text>
  <text x="634" y="348" font-size="16" fill="#f7d16b" font-family="Arial, Helvetica, sans-serif">- Verify no local secret paths are included.</text>
  <text x="634" y="376" font-size="16" fill="#f7d16b" font-family="Arial, Helvetica, sans-serif">- Re-run after approval signal.</text>
  <text x="634" y="404" font-size="16" fill="#f7d16b" font-family="Arial, Helvetica, sans-serif">- Keep this package local and reproducible.</text>

  <rect x="70" y="480" width="1060" height="130" rx="10" fill="#101f3b"/>
  <text x="95" y="518" font-size="21" fill="#9fdcff" font-family="Arial, Helvetica, sans-serif">Why this is safe for public docs</text>
  <text x="95" y="548" font-size="16" fill="#d8e2f8" font-family="Arial, Helvetica, sans-serif">
    No secrets, no credentials, no external endpoints, and no host-specific file paths.
  </text>
</svg>
